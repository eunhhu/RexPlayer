name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build qt6-base-dev
      - name: Build C++
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build
      - name: Test C++
        run: ctest --test-dir build --output-on-failure
      - name: Build + test Rust
        run: cargo build --release --workspace && cargo test --workspace --release
        working-directory: middleware
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p staging
          cp build/rexplayer staging/ 2>/dev/null || true
          cp build/librex_*.a staging/ 2>/dev/null || true
          ls -la staging/
          tar czf "rexplayer-${TAG}-linux-x86_64.tar.gz" -C staging .
          ls -la *.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: "*.tar.gz"
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        run: brew install qt@6
      - name: Build C++
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) && cmake --build build
      - name: Build + test Rust
        run: cargo build --release --workspace && cargo test --workspace --release
        working-directory: middleware
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p staging
          if [ -d build/rexplayer.app ]; then
            cp -R build/rexplayer.app staging/
          elif [ -f build/rexplayer ]; then
            cp build/rexplayer staging/
          fi
          cp build/librex_*.a staging/ 2>/dev/null || true
          ls -la staging/
          tar czf "rexplayer-${TAG}-macos.tar.gz" -C staging .
          ls -la *.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: "*.tar.gz"
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
      - name: Build C++
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DREX_ENABLE_WHPX=OFF
          cmake --build build --config Release
      - name: Check Rust (cross-platform crates)
        shell: bash
        working-directory: middleware
        run: |
          echo "Building cross-platform Rust crates (excluding Unix-only rex-devices and rex-ffi)..."
          cargo check -p rex-config -p rex-network -p rex-filesync -p rex-frida -p rex-update
      - name: Deploy Qt DLLs
        shell: bash
        run: |
          if [ -f "build/Release/rexplayer.exe" ]; then
            echo "Found rexplayer.exe, running windeployqt..."
            windeployqt build/Release/rexplayer.exe --release --no-translations --no-opengl-sw 2>/dev/null || true
          else
            echo "::warning::rexplayer.exe not found in build/Release/"
            echo "Listing build output:"
            find build -name "*.exe" -o -name "*.lib" -o -name "*.dll" 2>/dev/null || true
          fi
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          mkdir -p staging
          cp build/Release/rexplayer.exe staging/ 2>/dev/null || true
          cp build/Release/*.dll staging/ 2>/dev/null || true
          cp build/Release/librex_*.lib staging/ 2>/dev/null || true
          cp build/librex_*.lib staging/ 2>/dev/null || true
          cp build/*/librex_*.lib staging/ 2>/dev/null || true
          echo "Staging contents:"
          ls -la staging/
          cd staging && 7z a "../rexplayer-${TAG}-windows-x86_64.zip" .
          cd .. && ls -la *.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: "*.zip"
          if-no-files-found: warn

  release:
    needs: [build-linux, build-macos, build-windows]
    if: >-
      always() && !cancelled() &&
      (needs.build-linux.result == 'success' ||
       needs.build-macos.result == 'success' ||
       needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f
      - name: Verify at least one artifact exists
        run: |
          count=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | wc -l)
          echo "Found ${count} release artifact(s)"
          if [ "$count" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
