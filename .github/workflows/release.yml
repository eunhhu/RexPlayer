name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev libqt6widgets6 \
            libspice-client-glib-2.0-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build C++
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DREX_ENABLE_TESTS=ON
          cmake --build build

      - name: Test C++
        run: ctest --test-dir build --output-on-failure

      - name: Build and test Rust
        working-directory: middleware
        run: |
          cargo build --release --workspace
          cargo test --workspace --release

      - name: Package tar.gz
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p staging/rexplayer
          cp build/rexplayer staging/rexplayer/
          cp packaging/linux/rexplayer.desktop staging/rexplayer/
          cp README.md staging/rexplayer/ 2>/dev/null || true
          tar czf "rexplayer-${TAG}-linux-x86_64.tar.gz" -C staging rexplayer

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: "*.tar.gz"

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install qt@6 qemu spice-gtk glib pkg-config create-dmg

      - name: Build C++
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DREX_ENABLE_TESTS=ON
          cmake --build build

      - name: Test C++
        run: ctest --test-dir build --output-on-failure

      - name: Build and test Rust
        working-directory: middleware
        run: |
          cargo build --release --workspace
          cargo test --workspace --release

      - name: Deploy Qt frameworks
        run: |
          if [ -d build/rexplayer.app ]; then
            "$(brew --prefix qt@6)/bin/macdeployqt" build/rexplayer.app -verbose=1
          fi

      - name: Create DMG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [ -d build/rexplayer.app ]; then
            create-dmg \
              --volname "RexPlayer" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "rexplayer.app" 150 190 \
              --app-drop-link 450 190 \
              "rexplayer-${TAG}-macos-arm64.dmg" \
              build/rexplayer.app || true
          fi
          if [ ! -f "rexplayer-${TAG}-macos-arm64.dmg" ]; then
            mkdir -p staging
            cp -R build/rexplayer.app staging/ 2>/dev/null || cp build/rexplayer staging/
            tar czf "rexplayer-${TAG}-macos-arm64.tar.gz" -C staging .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            *.dmg
            *.tar.gz
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'

      - name: Build C++
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DREX_ENABLE_TESTS=ON
          cmake --build build --config Release

      - name: Build Rust
        shell: bash
        working-directory: middleware
        run: cargo build --release -p rex-config -p rex-frida -p rex-update

      - name: Deploy Qt DLLs
        shell: bash
        run: |
          if [ -f "build/Release/rexplayer.exe" ]; then
            windeployqt build/Release/rexplayer.exe --release --no-translations --no-opengl-sw 2>/dev/null || true
          fi

      - name: Package zip
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          mkdir -p staging
          cp build/Release/rexplayer.exe staging/ 2>/dev/null || true
          cp build/Release/*.dll staging/ 2>/dev/null || true
          if [ -d "build/Release/platforms" ]; then
            cp -r build/Release/platforms staging/
          fi
          if [ -d "build/Release/styles" ]; then
            cp -r build/Release/styles staging/
          fi
          cp README.md staging/ 2>/dev/null || true
          cd staging && 7z a "../rexplayer-${TAG}-windows-x86_64.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: "*.zip"
          if-no-files-found: warn

  release:
    needs: [build-linux, build-macos, build-windows]
    if: always() && !cancelled() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Verify artifacts exist
        run: |
          count=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" \) | wc -l)
          echo "Found ${count} release artifact(s)"
          if [ "$count" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
