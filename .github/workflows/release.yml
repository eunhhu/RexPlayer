name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build qt6-base-dev
      - name: Build C++
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build
      - name: Test C++
        run: ctest --test-dir build --output-on-failure
      - name: Build + test Rust
        run: cargo build --release --workspace && cargo test --workspace --release
        working-directory: middleware
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp build/rexplayer dist/ || true
          cp build/librex_*.a dist/ || true
          tar czf "dist/rexplayer-${TAG}-linux-x86_64.tar.gz" -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/*.tar.gz
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        run: brew install qt@6
      - name: Build C++
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) && cmake --build build
      - name: Build + test Rust
        run: cargo build --release --workspace && cargo test --workspace --release
        working-directory: middleware
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp build/rexplayer dist/ || true
          cp build/librex_*.a dist/ || true
          tar czf "dist/rexplayer-${TAG}-macos.tar.gz" -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.tar.gz
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
      - name: Build C++
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DREX_ENABLE_WHPX=OFF
          cmake --build build --config Release
      - name: Build + test Rust
        run: cargo build --release --workspace && cargo test --workspace --release
        working-directory: middleware
      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/rexplayer.exe dist/ || true
          cp build/Release/*.dll dist/ || true
          cp build/Release/librex_*.lib dist/ || true
          cd dist && 7z a "rexplayer-${TAG}-windows-x86_64.zip" . || tar czf "rexplayer-${TAG}-windows-x86_64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/rexplayer-*
          if-no-files-found: warn

  release:
    needs: [build-linux, build-macos, build-windows]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
