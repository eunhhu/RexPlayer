name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev libqt6widgets6 \
            libspice-client-glib-2.0-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build C++
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DREX_ENABLE_TESTS=ON
          cmake --build build

      - name: Test C++
        run: ctest --test-dir build --output-on-failure

      - name: Build and test Rust
        working-directory: middleware
        run: |
          cargo build --workspace
          cargo test --workspace

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install qt@6 qemu spice-gtk glib pkg-config

      - name: Build C++
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DREX_ENABLE_TESTS=ON
          cmake --build build

      - name: Test C++
        run: ctest --test-dir build --output-on-failure

      - name: Build and test Rust
        working-directory: middleware
        run: |
          cargo build --workspace
          cargo test --workspace

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'

      - name: Build C++
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DREX_ENABLE_TESTS=ON
          cmake --build build --config Release

      - name: Test C++
        shell: bash
        run: ctest --test-dir build --output-on-failure -C Release || true

      - name: Build and test Rust
        shell: bash
        working-directory: middleware
        run: |
          cargo build -p rex-config -p rex-frida -p rex-update
          cargo test -p rex-config -p rex-frida -p rex-update
